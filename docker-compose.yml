services:
  nginx:
    container_name: atelier-nginx
    image: nginx:1.27-alpine
    depends_on:
      - blog
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  blog:
    container_name: atelier-blog
    image: atelier-blog:test
    build:
      context: .
      dockerfile: apps/blog/Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
